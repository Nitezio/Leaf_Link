name: plantcare_pro
description: A comprehensive plant management app with AI insights and gamification.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  google_fonts: ^6.2.1
  cached_network_image: ^3.3.1
  provider: ^6.1.2
  shared_preferences: ^2.2.3
  firebase_core: ^2.10.0
  firebase_auth: ^4.6.0
  cloud_firestore: ^4.6.0
  firebase_storage: ^11.0.0
  google_sign_in: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  network_image_mock: ^2.1.1

flutter:
  uses-material-design: true
