name: plantcare_pro
description: A comprehensive plant management app with AI insights and gamification.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  google_fonts: ^8.1.0
  cached_network_image: ^3.4.1
  provider: ^6.1.2
  shared_preferences: ^2.2.3
  firebase_core: ^4.9.0
  firebase_auth: ^6.5.1
  cloud_firestore: ^6.4.1
  firebase_storage: ^13.4.1
  google_sign_in: ^7.2.0
  flutter_secure_storage: ^10.3.0
  logger: ^2.7.0
  image_picker: ^1.2.2
  path_provider: ^2.0.15
  path: ^1.8.2
  flutter_local_notifications: ^21.0.0
  flutter_timezone: ^5.0.2
  timezone: ^0.11.0
  flutter_dotenv: ^5.0.2
  http: ^1.2.2
  model_viewer_plus: ^1.10.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  network_image_mock: ^2.1.1

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/models/
